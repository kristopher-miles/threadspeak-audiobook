<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alexandria Audiobook</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="#"><i class="fas fa-book-open me-2"></i>Alexandria</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link nav-pipeline active" data-tab="setup">1. Setup</a></li>
          <li class="nav-item"><a class="nav-link nav-pipeline" data-tab="script">2. Script</a></li>
          <li class="nav-item"><a class="nav-link nav-pipeline" data-tab="voices">3. Voices</a></li>
          <li class="nav-item"><a class="nav-link nav-pipeline" data-tab="editor">4. Editor</a></li>
          <li class="nav-item"><a class="nav-link nav-pipeline" data-tab="proofread">5. Proofread</a></li>
          <li class="nav-item"><a class="nav-link nav-pipeline" data-tab="audio">6. Export</a></li>
          <li class="nav-item ms-3 border-start border-secondary ps-3"><a class="nav-link nav-advanced" data-tab="designer">Designer</a></li>
          <li class="nav-item"><a class="nav-link nav-advanced" data-tab="dictionary">Dictionary</a></li>
          <li class="nav-item"><a class="nav-link nav-advanced" data-tab="dataset-builder">Dataset</a></li>
          <li class="nav-item"><a class="nav-link nav-advanced" data-tab="training">Training</a></li>
        </ul>
        <div class="d-flex align-items-center gap-3 text-light small">
          <div class="form-check form-switch mb-0" id="legacy-mode-toggle-wrapper">
            <input class="form-check-input" type="checkbox" id="legacy-mode-toggle">
            <label class="form-check-label" for="legacy-mode-toggle">Legacy</label>
          </div>
          <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" id="dark-mode-toggle" checked onchange="toggleDarkMode(this.checked)">
            <label class="form-check-label" for="dark-mode-toggle">Dark</label>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="container-wide">
    <div id="tab-fragments-root"></div>
  </div>

  <div id="toast-container" class="position-fixed bottom-0 end-0 p-3" style="z-index: 1090;"></div>

  <div class="modal fade" id="confirmModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-body fs-6" id="confirmModalBody"></div>
        <div class="modal-footer py-2">
          <button type="button" class="btn btn-secondary btn-sm" id="confirmModalCancel" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary btn-sm" id="confirmModalOk">OK</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/static/js/main.js?v=20260328c"></script>
</body>
</html>
