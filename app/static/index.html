<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Threadspeak Audiobook Generator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="/static/css/app.css?v=19" rel="stylesheet">
</head>
<body>
  <nav id="app-sidebar">
    <div class="sidebar-brand">
      <i class="fas fa-book-open"></i>
      <span>Threadspeak</span>
    </div>
    <ul class="sidebar-nav">
      <li><a class="nav-link nav-pipeline active" data-tab="script">Script</a></li>
      <li><a class="nav-link nav-pipeline" data-tab="voices">Voices</a></li>
      <li><a class="nav-link nav-pipeline" data-tab="editor">Editor</a></li>
      <li><a class="nav-link nav-pipeline" data-tab="proofread">Proofread</a></li>
      <li><a class="nav-link nav-pipeline" data-tab="audio">Export</a></li>
      <li class="sidebar-divider"></li>
      <li><a class="nav-link nav-advanced" data-tab="dictionary">Dictionary</a></li>
      <li><a class="nav-link nav-advanced" data-tab="saved-scripts">Projects</a></li>
      <li><a class="nav-link nav-advanced" data-tab="setup">Settings</a></li>
      <li class="nav-legacy-only sidebar-divider"></li>
      <li class="nav-legacy-only"><a class="nav-link nav-advanced" data-tab="designer">Designer</a></li>
      <li class="nav-legacy-only"><a class="nav-link nav-advanced" data-tab="dataset-builder">Dataset</a></li>
      <li class="nav-legacy-only"><a class="nav-link nav-advanced" data-tab="training">Training</a></li>
    </ul>
    <div class="sidebar-footer">
      <div class="form-check form-switch mb-0">
        <input class="form-check-input" type="checkbox" id="dark-mode-toggle" checked onchange="toggleDarkMode(this.checked)">
        <label class="form-check-label" for="dark-mode-toggle">Dark</label>
      </div>
    </div>
  </nav>

  <div class="container-wide">
    <div id="tab-fragments-root"></div>
  </div>

  <div id="toast-container" class="position-fixed bottom-0 end-0 p-3" style="z-index: 1090;"></div>

  <div class="modal fade" id="confirmModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-body fs-6" id="confirmModalBody"></div>
        <div class="modal-footer py-2">
          <button type="button" class="btn btn-secondary btn-sm" id="confirmModalCancel" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary btn-sm" id="confirmModalOk">OK</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/static/js/main.js?v=20260409a"></script>
</body>
</html>
