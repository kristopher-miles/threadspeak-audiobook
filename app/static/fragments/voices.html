        <div id="voices-tab" class="tab-content" style="display:none;">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h4 class="m-0">Voice Configuration</h4>
                    <div class="d-flex align-items-center gap-2">
                        <div class="d-flex align-items-center gap-1">
                            <label for="narrator-threshold-input" class="small text-muted mb-0">Narrator Threshold</label>
                            <input
                                type="number"
                                class="form-control form-control-sm"
                                id="narrator-threshold-input"

                <div class="card-body">
