name: Bug Report
description: Report a bug in the Threadspeak pipeline or UI
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Before submitting, please check:
        - [Troubleshooting](https://github.com/kristopher-miles/threadspeak-audiobook/blob/main/wiki/Troubleshooting.md)
        - [First Launch](https://github.com/kristopher-miles/threadspeak-audiobook/blob/main/wiki/First-Launch.md)
        - Existing [issues](https://github.com/kristopher-miles/threadspeak-audiobook/issues)

  - type: dropdown
    id: stage
    attributes:
      label: Pipeline stage
      description: Where does the bug happen?
      options:
        - Setup / Config
        - Script Ingestion (upload/paragraphs/chapters)
        - Dialogue Attribution
        - Temperament Extraction
        - Script Construction
        - Voices
        - Editor / Render
        - Proofread (Whisper)
        - Export (MP3/Audacity/M4B)
        - Save/Load/Resume
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear summary of expected behavior vs actual behavior.
      placeholder: "Expected X, but got Y."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal reproducible steps.
      placeholder: |
        1. Open Script tab
        2. Upload source document
        3. Run Dialogue Attribution
        4. Observe error in terminal
    validations:
      required: true

  - type: input
    id: source_type
    attributes:
      label: Source file type (if relevant)
      placeholder: "txt, md, docx, epub"
    validations:
      required: false

  - type: dropdown
    id: workflow_mode
    attributes:
      label: Workflow context
      options:
        - Fresh run
        - Resumed run
        - Loaded saved project
        - Not sure
    validations:
      required: true

  - type: textarea
    id: prompts
    attributes:
      label: Prompt customization (if relevant)
      description: Did you modify any prompts in Setup or prompt files?
      placeholder: "No custom prompts / list modified prompt keys"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Terminal / log output
      description: |
        Paste relevant output from the Pinokio terminal.
        This is usually the most useful data for diagnosis.
      render: shell
    validations:
      required: true

  - type: dropdown
    id: gpu
    attributes:
      label: Hardware / accelerator
      options:
        - NVIDIA (Windows)
        - NVIDIA (Linux)
        - AMD (Linux / ROCm)
        - AMD (Windows, CPU mode)
        - Apple Silicon (macOS, CPU mode)
        - Intel / CPU only
        - Other
    validations:
      required: true

  - type: input
    id: gpu_model
    attributes:
      label: GPU model and VRAM (or CPU)
      placeholder: "RTX 4090 24GB / RX 7900 XTX 24GB / CPU"
    validations:
      required: false

  - type: textarea
    id: env
    attributes:
      label: Environment details
      description: Include OS, Python environment details, and anything unusual.
      placeholder: "Windows 11, Pinokio, local LLM via LM Studio, local TTS"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, sample snippets, or anything else that helps.
    validations:
      required: false
