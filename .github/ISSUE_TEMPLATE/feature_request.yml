name: Feature Request
description: Suggest an improvement to Threadspeak
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please check existing [issues](https://github.com/kristopher-miles/threadspeak-audiobook/issues) first.

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Script Ingestion / Chaptering
        - Dialogue Attribution
        - Temperament Extraction
        - Voices / Voice Design / Clone
        - Editor / Rendering
        - Proofread
        - Export
        - Save/Load/Resume
        - API
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What should change?
      description: Describe the feature clearly.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Explain current pain points or limits.
    validations:
      required: true

  - type: textarea
    id: workflow
    attributes:
      label: Proposed user workflow
      description: Step-by-step behavior from user perspective.
      placeholder: |
        1. User does X
        2. System responds with Y
        3. User can then do Z
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds or other approaches you tried.
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Scope and constraints
      description: Performance, compatibility, or UX constraints that matter.
    validations:
      required: false
